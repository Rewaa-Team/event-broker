name: Publish to NPM
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
      - name: npm 10
        run: npm i -g npm@10 --registry=https://registry.npmjs.org
      - name: Install Dependencies, Build and Publish package on Github Registry 📦
        run: npm ci && npm publish
